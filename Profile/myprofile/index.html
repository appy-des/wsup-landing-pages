function MenuSheet({ open, onClose, onLogout, onMyCards }) {
  if (!open) return null;
  const item = (icon, label, color, onClick) => {
    const isDestructive = color === "#f87171";
    const hoverBg  = isDestructive ? "rgba(248,113,113,0.08)" : "rgba(255,255,255,0.07)";
    const pressBg  = isDestructive ? "rgba(248,113,113,0.14)" : "rgba(255,255,255,0.10)";
    return (
      <button
        onClick={() => { onClose(); onClick && onClick(); }}
        onMouseEnter={e => e.currentTarget.style.background = hoverBg}
        onMouseLeave={e => e.currentTarget.style.background = "none"}
        onMouseDown={e => e.currentTarget.style.background = pressBg}
        onMouseUp={e => e.currentTarget.style.background = hoverBg}
        style={{
          display: "flex", alignItems: "center", gap: 14,
          width: "calc(100% - 16px)", margin: "0 8px", padding: "14px 16px",
          background: "none", border: "none", cursor: "pointer", borderRadius: 8,
          fontFamily: "inherit", fontSize: 15, fontWeight: 500,
          color: color || "rgba(255,255,255,0.90)",
          textAlign: "left", transition: "background 0.12s",
        }}>
        {icon}
        {label}
      </button>
    );
  };
  return (
    <div style={{ position: "absolute", inset: 0, zIndex: 30 }}>
      {/* backdrop */}
      <div onClick={onClose} style={{
        position: "absolute", inset: 0,
        background: "rgba(0,0,0,0.55)",
        animation: "fadeIn 0.2s ease-out",
      }} />
      {/* sheet */}
      <div style={{
        position: "absolute", bottom: 0, left: 0, right: 0,
        background: "#1a1a1a",
        borderRadius: "20px 20px 0 0",

function BioSheet({ open, onClose, bio, name }) {
  const [showFade, setShowFade] = React.useState(true);
  const sheetRef = useRef(null);
  const touchStart = useRef(null);

  if (!open) return null;

  const onTouchStart = (e) => {
    touchStart.current = e.touches[0].clientY;
  };
  const onTouchMove = (e) => {
    if (touchStart.current === null || !sheetRef.current) return;
    const delta = e.touches[0].clientY - touchStart.current;
    if (delta > 0) {
      sheetRef.current.style.transform = `translateY(${delta}px)`;
      sheetRef.current.style.transition = "none";
    }
  };
  const onTouchEnd = (e) => {
    if (touchStart.current === null || !sheetRef.current) return;
    const delta = e.changedTouches[0].clientY - touchStart.current;
    touchStart.current = null;
    sheetRef.current.style.transition = "transform 0.22s ease";
    if (delta > 80) {
      onClose();
    } else {
      sheetRef.current.style.transform = "translateY(0)";
    }
  };

  const onScroll = (e) => {
    const el = e.target;
    setShowFade(el.scrollHeight - el.scrollTop > el.clientHeight + 10);
  };

  return (
    <div style={{ position: "absolute", inset: 0, zIndex: 30 }}>
      <div onClick={onClose} style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.55)", animation: "fadeIn 0.2s ease-out" }} />
      <div
        ref={sheetRef}
        onTouchStart={onTouchStart}
        onTouchMove={onTouchMove}
        onTouchEnd={onTouchEnd}
        style={{
          position: "absolute", bottom: 0, left: 0, right: 0,
          maxHeight: "78%",
          background: "#1a1a1a",
          borderRadius: "20px 20px 0 0",
          borderTop: "1px solid rgba(255,255,255,0.10)",
          animation: "slideUp 0.28s cubic-bezier(0.32,0.72,0,1)",
          boxShadow: "0 -4px 32px rgba(0,0,0,0.40)",
          display: "flex", flexDirection: "column",
          overflow: "hidden",
        }}>
        {/* drag handle — functional swipe-down */}
        <div style={{ width: 36, height: 4, borderRadius: 2, background: "rgba(255,255,255,0.18)", margin: "12px auto 0", flexShrink: 0 }} />
        {/* header */}
        <div style={{
          display: "flex", alignItems: "center", justifyContent: "space-between",
          padding: "14px 20px 12px", borderBottom: "1px solid rgba(255,255,255,0.08)", flexShrink: 0,
        }}>
          <p style={{ margin: 0, fontWeight: 600, fontSize: 16, color: "white" }}>{name}</p>
          {/* 44×44 tap target wrapping 28px visible circle */}
          <button onClick={onClose} style={{
            display: "flex", alignItems: "center", justifyContent: "center",
            width: 44, height: 44, margin: "-8px -10px -8px 0",
            background: "none", border: "none", cursor: "pointer",
          }}>
            <div style={{
              display: "flex", alignItems: "center", justifyContent: "center",
              width: 28, height: 28, borderRadius: "50%",

            }}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
                <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"/>
              </svg>
            </div>

        {/* scrollable bio + fade indicator */}

        const color   = s.up ? "rgba(74,222,128,0.55)" : "rgba(248,113,113,0.55)";
        const showTip = activeTip === s.label;
        return (
          <React.Fragment key={s.label}>
            {i > 0 && (
              <div style={{ flexShrink: 0, width: 1, background: "rgba(255,255,255,0.10)", margin: "4px 0" }} />
            )}
            <div
              style={{ display: "flex", flexDirection: "column", alignItems: "center", flex: 1, padding: "4px 0", gap: 0, position: "relative", userSelect: "none" }}
            >
              {showTip && (
                <div style={{
                  position: "absolute", bottom: "calc(100% + 7px)",
                  left: "50%", transform: "translateX(-50%)",
                  background: "rgba(13,13,13,0.96)",
                  border: "1px solid rgba(255,255,255,0.12)",
                  backdropFilter: "blur(12px)",
                  borderRadius: 8, padding: "8px 12px",
                  display: "flex", alignItems: "center",
                  whiteSpace: "nowrap", zIndex: 10,
                  animation: "fadeIn 0.15s ease-out",
                  boxShadow: "0 4px 16px rgba(0,0,0,0.40)",
                }}>
                  <span style={{ fontSize: 11, fontWeight: 500, color: "rgba(255,255,255,0.75)", lineHeight: 1, display: "block" }}>Updated weekly</span>
                  {/* arrow */}
                  <div style={{
                    position: "absolute", bottom: -4, left: "50%",
                    transform: "translateX(-50%) rotate(45deg)",
                    width: 7, height: 7,
                    background: "rgba(13,13,13,0.96)",
                    borderRight: "1px solid rgba(255,255,255,0.12)",
                    borderBottom: "1px solid rgba(255,255,255,0.12)",
                  }} />
                </div>
              )}
              <div
                onClick={s.label === "Following" ? onFollowingOpen : s.label === "Followers" ? onFollowersOpen : undefined}
                style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 3, cursor: (s.label === "Following" || s.label === "Followers") ? "pointer" : "default" }}
              >
                <div style={{ display: "flex", alignItems: "center", gap: 0 }}>
                  <span style={{ fontWeight: 600, fontSize: 17, color: "white", lineHeight: 1, marginLeft: s.label === "Following" ? 8 : 0, textDecoration: "none" }}>{s.value}</span>
                  {(s.label === "Followers" || s.label === "Following") && (
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
                      <path d="M9 18l6-6-6-6" stroke="#82a1ff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
                    </svg>
                  )}
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 3 }}>
                  <span style={{ fontSize: 11, color: "rgba(255,255,255,0.50)", lineHeight: 1 }}>{s.label}</span>
                  {s.trend && (
                    <span
                      onClick={() => setActiveTip(showTip ? null : s.label)}
                      style={{ display: "flex", alignItems: "center", gap: 3, cursor: "pointer" }}
                    >
                      <span style={{ fontSize: 11, fontWeight: 500, lineHeight: 1, color }}>{s.trend.replace(/[+\-%]/g, "")}</span>
                      <svg width="10" height="10" viewBox="0 0 10 10" fill="none" style={{ display: "block", flexShrink: 0, transform: "translateY(-1px)" }}>
                        {s.up
                          ? <path d="M5 8.5V1.5M2 4.5l3-3 3 3" stroke="rgba(74,222,128,0.55)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                          : <path d="M5 1.5v7M2 5.5l3 3 3-3" stroke="rgba(248,113,113,0.55)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                        }
                      </svg>
                    </span>
                  )}
                </div>
              </div>
            </div>
          </React.Fragment>
        );
      })}
    </div>
  );
}

function CommentsSheet({ open, onClose }) {
  const [comments, setComments]   = useState(COMMENTS);
  const [expanded, setExpanded]   = useState({});
  const [liked,    setLiked]      = useState({});
  const [replyingTo, setReplyingTo] = useState(null); // { id, user }
  const [inputText, setInputText]       = useState("");
  const [showFade,  setShowFade]        = useState(true);
  const [newCommentId, setNewCommentId] = useState(null);

  const sheetRef  = useRef(null);
  const listRef   = useRef(null);
  const inputRef  = useRef(null);
  const touchStart = useRef(null);

  // re-trigger slideUp animation each time the sheet opens
  React.useEffect(() => {
    if (open && sheetRef.current) {
      sheetRef.current.style.animation = "none";
      sheetRef.current.offsetHeight; // force reflow
      sheetRef.current.style.animation = "slideUp 0.28s cubic-bezier(0.32,0.72,0,1)";
    }
  }, [open]);

  // ── swipe-to-dismiss on drag handle only ──────────────────────────────
  const onHandleTouchStart = (e) => { touchStart.current = e.touches[0].clientY; };
  const onHandleTouchMove  = (e) => {
    if (touchStart.current === null || !sheetRef.current) return;
    const delta = e.touches[0].clientY - touchStart.current;
    if (delta > 0) { sheetRef.current.style.transform = `translateY(${delta}px)`; sheetRef.current.style.transition = "none"; }
  };
  const onHandleTouchEnd = (e) => {
    if (touchStart.current === null || !sheetRef.current) return;
    const delta = e.changedTouches[0].clientY - touchStart.current;
    touchStart.current = null;
    sheetRef.current.style.transition = "transform 0.22s ease";
    if (delta > 80) { onClose(); } else { sheetRef.current.style.transform = "translateY(0)"; }
  };

  const onListScroll = (e) => {
    const el = e.target;
    setShowFade(el.scrollHeight - el.scrollTop > el.clientHeight + 10);
  };

  const toggleLike   = (key) => setLiked(prev => ({ ...prev, [key]: !prev[key] }));
  const toggleExpand = (id)  => setExpanded(prev => ({ ...prev, [id]: !prev[id] }));

  const startReply = (id, user) => {
    setReplyingTo({ id, user });
    setTimeout(() => inputRef.current && inputRef.current.focus(), 50);
  };

  const handleSend = () => {
    if (!inputText.trim()) return;
    const newEntry = { id: Date.now(), user: "Alex Moonlight", avatar: AVATAR_IMG, text: inputText.trim(), time: "now", likes: 0 };
    if (replyingTo) {
      setComments(prev => prev.map(c =>
        c.id === replyingTo.id ? { ...c, replies: [...c.replies, newEntry] } : c
      ));
      setExpanded(prev => ({ ...prev, [replyingTo.id]: true }));
    } else {
      setComments(prev => [{ ...newEntry, replies: [] }, ...prev]);
      setNewCommentId(newEntry.id);
      setTimeout(() => { if (listRef.current) listRef.current.scrollTo({ top: 0, behavior: "smooth" }); }, 0);
      setTimeout(() => setNewCommentId(null), 600);
    }
    setInputText("");
    setReplyingTo(null);
  };

  // total count includes replies
  const totalCount = comments.reduce((sum, c) => sum + 1 + c.replies.length, 0);

  // ── inline comment row renderer ────────────────────────────────────────
  const renderComment = (c, isReply) => {
    const likeKey = (isReply ? "r-" : "c-") + c.id;
    const isLiked = !!liked[likeKey];
    const isNew = c.id === newCommentId;
    return (
      <div key={c.id} style={{ display: "flex", gap: 10, paddingTop: isReply ? 10 : 14, animation: isNew ? "commentIn 0.35s cubic-bezier(0.22,1,0.36,1) both" : undefined }}>
        {/* avatar */}
        <div style={{ flexShrink: 0, width: isReply ? 32 : 40, height: isReply ? 32 : 40, borderRadius: "50%", overflow: "hidden", background: "linear-gradient(135deg,#0083ff,#b42ef9)" }}>
          <img src={c.avatar} alt={c.user} style={{ width: "100%", height: "100%", objectFit: "cover", objectPosition: "top" }}
            onError={(e) => { e.target.style.display = "none"; }} />
        </div>
        <div style={{ flex: 1, minWidth: 0 }}>
          {/* name + time */}
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8, marginBottom: 3 }}>
            <span style={{ fontSize: isReply ? 12 : 13, fontWeight: 600, color: "white", lineHeight: 1 }}>{c.user}</span>
            <span style={{ fontSize: 11, color: "rgba(255,255,255,0.30)", flexShrink: 0, lineHeight: 1 }}>{c.time}</span>
          </div>
          {/* text */}
          <p style={{ margin: "0 0 8px", fontSize: 13, color: "rgba(255,255,255,0.78)", lineHeight: 1.55 }}>{c.text}</p>
          {/* actions — padding extends tap area to ~44px without negative-margin overlap */}
          <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
            <button onClick={() => toggleLike(likeKey)} style={{ display: "flex", alignItems: "center", gap: 5, background: "none", border: "none", cursor: "pointer", padding: "8px 8px", fontFamily: "inherit" }}>
              <svg width="15" height="15" viewBox="0 0 24 24" fill={isLiked ? "#f87171" : "none"} style={{ display: "block", flexShrink: 0, position: "relative", top: -1 }}>
                <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"
                  stroke={isLiked ? "#f87171" : "rgba(255,255,255,0.35)"} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
              <span style={{ fontSize: 12, lineHeight: 1, color: isLiked ? "#f87171" : "rgba(255,255,255,0.35)" }}>{c.likes + (isLiked ? 1 : 0)}</span>
            </button>
            {!isReply && (
              <button onClick={() => startReply(c.id, c.user)} style={{ background: "none", border: "none", cursor: "pointer", padding: "8px 8px", fontFamily: "inherit", fontSize: 12, fontWeight: 500, color: "rgba(255,255,255,0.35)" }}>
                Reply
              </button>
            )}
          </div>
        </div>
      </div>
    );
  };

  // keep mounted to preserve draft — hide with display:none when closed
  return (
    <div style={{ position: "absolute", inset: 0, zIndex: 30, display: open ? undefined : "none" }}>
      {/* backdrop */}
      <div onClick={onClose} style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.55)", animation: "fadeIn 0.2s ease-out" }} />
      {/* sheet */}
      <div ref={sheetRef} style={{
        position: "absolute", bottom: 0, left: 0, right: 0,
        height: "88%", background: "#1a1a1a",
        borderRadius: "20px 20px 0 0",
        borderTop: "1px solid rgba(255,255,255,0.10)",
        animation: "slideUp 0.28s cubic-bezier(0.32,0.72,0,1)",
        boxShadow: "0 -4px 32px rgba(0,0,0,0.40)",
        display: "flex", flexDirection: "column", overflow: "hidden",
      }}>

        {/* drag handle — 44px tall touch area */}
        <div onTouchStart={onHandleTouchStart} onTouchMove={onHandleTouchMove} onTouchEnd={onHandleTouchEnd}
          style={{ padding: "20px 0 16px", cursor: "grab", flexShrink: 0 }}>
          <div style={{ width: 36, height: 4, borderRadius: 2, background: "rgba(255,255,255,0.18)", margin: "0 auto" }} />
        </div>

        {/* header */}
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 20px 12px", borderBottom: "1px solid rgba(255,255,255,0.08)", flexShrink: 0 }}>
          <p style={{ margin: 0, fontWeight: 600, fontSize: 16, color: "white" }}>
            Comments <span style={{ fontSize: 13, fontWeight: 400, color: "rgba(255,255,255,0.35)", marginLeft: 8 }}>{totalCount}</span>
          </p>
          <button onClick={onClose} style={{ display: "flex", alignItems: "center", justifyContent: "center", width: 44, height: 44, margin: "-8px -10px -8px 0", background: "none", border: "none", cursor: "pointer" }}>
            <div style={{ width: 28, height: 28, borderRadius: "50%", background: "rgba(255,255,255,0.08)", display: "flex", alignItems: "center", justifyContent: "center", color: "rgba(255,255,255,0.60)" }}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"/></svg>
            </div>
          </button>
        </div>

        {/* comment list */}
        <div style={{ position: "relative", flex: 1, minHeight: 0, overflow: "hidden" }}>
          <div ref={listRef} onScroll={onListScroll} style={{ position: "absolute", inset: 0, overflowY: "auto", scrollbarWidth: "none", padding: "0 16px 16px" }}>
            {comments.length === 0 && (
              <div style={{ textAlign: "center", padding: "48px 24px", color: "rgba(255,255,255,0.25)", fontSize: 14 }}>
                No comments yet. Be the first!
              </div>
            )}
            {comments.map((c) => (
              <div key={c.id} style={{ borderBottom: "1px solid rgba(255,255,255,0.06)", paddingBottom: 12 }}>
                {renderComment(c, false)}
                {/* replies toggle */}
                {c.replies.length > 0 && (
                  <button onClick={() => toggleExpand(c.id)} style={{
                    display: "flex", alignItems: "center", gap: 5,
                    background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.10)",
                    borderRadius: 999, padding: "4px 10px", marginTop: 10, marginLeft: 50,
                    cursor: "pointer", fontFamily: "inherit",
                    fontSize: 11, fontWeight: 500, color: "rgba(255,255,255,0.50)",
                  }}>
                    {c.replies.length} {c.replies.length === 1 ? "Reply" : "Replies"}
                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" style={{ display: "block", flexShrink: 0, position: "relative", top: -1, transition: "transform 0.2s", transform: expanded[c.id] ? "rotate(180deg)" : "none" }}>
                      <path d="M6 9l6 6 6-6" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
                    </svg>
                  </button>
                )}
                {/* expanded replies */}
                {expanded[c.id] && (
                  <div style={{ marginLeft: 50, marginTop: 4, paddingLeft: 12, borderLeft: "2px solid rgba(255,255,255,0.07)" }}>
                    {c.replies.map(r => renderComment(r, true))}
                  </div>
                )}
              </div>
            ))}
          </div>
          {showFade && (
            <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, height: 40, background: "linear-gradient(to bottom, transparent, #1a1a1a)", pointerEvents: "none" }} />
          )}
        </div>

        {/* compose bar */}
        <div style={{ borderTop: "1px solid rgba(255,255,255,0.08)", padding: "8px 12px", paddingBottom: "calc(10px + env(safe-area-inset-bottom, 0px))", background: "#1a1a1a", flexShrink: 0 }}>
          {/* replying-to chip */}
          {replyingTo && (
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8, padding: "5px 10px", background: "rgba(255,255,255,0.05)", borderRadius: 8 }}>
              <span style={{ fontSize: 12, color: "rgba(255,255,255,0.45)" }}>
                Replying to <span style={{ color: "#82a1ff", fontWeight: 600 }}>@{replyingTo.user}</span>
              </span>
              <button onClick={() => setReplyingTo(null)} style={{ background: "none", border: "none", cursor: "pointer", padding: "4px", margin: "-4px", color: "rgba(255,255,255,0.40)", display: "flex", alignItems: "center" }}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>
              </button>
            </div>
          )}
          <form onSubmit={(e) => { e.preventDefault(); handleSend(); }} style={{ display: "flex", alignItems: "center", gap: 10 }}>
            {/* own avatar */}
            <div style={{ width: 32, height: 32, borderRadius: "50%", overflow: "hidden", background: "linear-gradient(135deg,#0083ff,#b42ef9)", flexShrink: 0 }}>
              <img src={AVATAR_IMG} alt="You" style={{ width: "100%", height: "100%", objectFit: "cover", objectPosition: "top" }} />
            </div>
            {/* input pill */}
            <div style={{ flex: 1, display: "flex", alignItems: "center", background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.10)", borderRadius: 50, padding: "0 14px", height: 40 }}>
              <input
                ref={inputRef}
                value={inputText}
                onChange={(e) => setInputText(e.target.value)}
                placeholder={replyingTo ? `Reply to @${replyingTo.user}...` : `Add a comment for ${PROFILE.name.split(" ")[0].toLowerCase()}...`}
                maxLength={500}
                inputMode="text"
                enterKeyHint="send"
                style={{ flex: 1, background: "none", border: "none", outline: "none", fontSize: 13, color: "white", fontFamily: "inherit", caretColor: "#82a1ff" }}
              />
            </div>
            {/* send button */}
            <button type="submit" disabled={!inputText.trim()} style={{
              width: 40, height: 40, borderRadius: "50%", flexShrink: 0, border: "none",
              background: inputText.trim() ? "#4a3ec6" : "rgba(255,255,255,0.08)",
              cursor: inputText.trim() ? "pointer" : "default",
              display: "flex", alignItems: "center", justifyContent: "center",
              transition: "background 0.2s",
            }}>
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
                <path d="M22 2L11 13M22 2L15 22L11 13L2 9L22 2Z" stroke={inputText.trim() ? "white" : "rgba(255,255,255,0.30)"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </button>
          </form>
        </div>

      </div>
    </div>
  );
}

function BadgesSheet({ open, onClose }) {
  const sheetRef = useRef(null);
  const touchStart = useRef(null);
  const [showFade, setShowFade] = React.useState(false);
  const [selectedBadge, setSelectedBadge] = React.useState(null);

  if (!open) return null;

  const onTouchStart = (e) => { touchStart.current = e.touches[0].clientY; };
  const onTouchMove = (e) => {
    if (touchStart.current === null || !sheetRef.current) return;
    const delta = e.touches[0].clientY - touchStart.current;
    if (delta > 0) { sheetRef.current.style.transform = `translateY(${delta}px)`; sheetRef.current.style.transition = "none"; }
  };
  const onTouchEnd = (e) => {
    if (touchStart.current === null || !sheetRef.current) return;
    const delta = e.changedTouches[0].clientY - touchStart.current;
    touchStart.current = null;
    sheetRef.current.style.transition = "transform 0.22s ease";
    if (delta > 80) { onClose(); } else { sheetRef.current.style.transform = "translateY(0)"; }
  };
  const onScroll = (e) => {
    const el = e.target;
    setShowFade(el.scrollHeight - el.scrollTop > el.clientHeight + 10);
  };

  return (
    <div style={{ position: "absolute", inset: 0, zIndex: 30 }}>
      <div onClick={onClose} style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.55)", animation: "fadeIn 0.2s ease-out" }} />
      <div
        ref={sheetRef}
        onTouchStart={onTouchStart}
        onTouchMove={onTouchMove}
        onTouchEnd={onTouchEnd}
        style={{
          position: "absolute", bottom: 0, left: 0, right: 0,
          maxHeight: "82%",
          background: "#1a1a1a",
          borderRadius: "20px 20px 0 0",
          borderTop: "1px solid rgba(255,255,255,0.10)",
          animation: "slideUp 0.28s cubic-bezier(0.32,0.72,0,1)",
          boxShadow: "0 -4px 32px rgba(0,0,0,0.40)",
          display: "flex", flexDirection: "column",
          overflow: "hidden",
        }}>
        {/* drag handle */}
        <div style={{ width: 36, height: 4, borderRadius: 2, background: "rgba(255,255,255,0.18)", margin: "12px auto 0", flexShrink: 0 }} />
        {/* header */}
        <div style={{
          display: "flex", alignItems: "center", justifyContent: "space-between",
          padding: "14px 20px 12px", borderBottom: "1px solid rgba(255,255,255,0.08)", flexShrink: 0,
        }}>
          <div>
            <p style={{ margin: 0, fontWeight: 600, fontSize: 16, color: "white" }}>Badges</p>
            <p style={{ margin: "2px 0 0", fontSize: 12, color: "rgba(255,255,255,0.40)" }}>{BADGES.length} earned</p>
          </div>
          <button onClick={onClose} style={{
            display: "flex", alignItems: "center", justifyContent: "center",
            width: 44, height: 44, margin: "-8px -10px -8px 0",
            background: "none", border: "none", cursor: "pointer",
          }}>
            <div style={{
              width: 28, height: 28, borderRadius: "50%",
              background: "rgba(255,255,255,0.08)",
              display: "flex", alignItems: "center", justifyContent: "center",
              color: "rgba(255,255,255,0.60)",
            }}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
                <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"/>
              </svg>
            </div>
          </button>
        </div>
        {/* scrollable grid */}
        <div style={{ position: "relative", flex: 1, minHeight: 0 }}>
          <div onScroll={onScroll} style={{ height: "100%", overflowY: "auto", scrollbarWidth: "none", padding: "16px 16px", paddingBottom: "calc(24px + env(safe-area-inset-bottom, 0px))" }}>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 10 }}>
              {BADGES.map((b) => (
                <div key={b.label} onClick={() => setSelectedBadge(b)} style={{
                  display: "flex", flexDirection: "column", alignItems: "center",
                  padding: "12px 6px 10px",
                  borderRadius: 16,
                  background: "rgba(255,255,255,0.06)",
                  border: "1px solid rgba(255,255,255,0.10)",
                  cursor: "pointer",
                }}>
                  <div style={{
                    display: "flex", alignItems: "center", justifyContent: "center",
                    width: 38, height: 38, borderRadius: "50%",
                    background: `${b.color}15`,
                    border: `1.5px solid ${b.color}35`,
                    fontSize: 19, marginBottom: 8, flexShrink: 0,
                  }}>
                    {b.emoji}
                  </div>
                  <span style={{ fontSize: 10, color: "rgba(255,255,255,0.90)", fontWeight: 500, textAlign: "center", lineHeight: 1.3, width: "100%", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                    {b.label}

                  <span style={{ fontSize: 11, color: "rgba(255,255,255,0.50)", textAlign: "center", marginTop: 3, lineHeight: 1.3, whiteSpace: "nowrap" }}>
                    {b.sub}

          {showFade && (

          )}

        <BadgeDetailPopup badge={selectedBadge} onClose={() => setSelectedBadge(null)} />
      </div>
    </div>
  );
}

function BadgesWidget({ onSeeAll }) {
  const rowRef = useRef(null);
  const drag = useRef({ active: false, startX: 0, scrollLeft: 0 });
  const [selectedBadge, setSelectedBadge] = React.useState(null);

  const onWheel = (e) => {
    if (!rowRef.current) return;
    e.preventDefault();
    rowRef.current.scrollLeft += e.deltaY + e.deltaX;
  };
  const onMouseDown = (e) => {
    drag.current = { active: true, startX: e.pageX, scrollLeft: rowRef.current.scrollLeft };
    rowRef.current.style.cursor = "grabbing";
  };
  const onMouseMove = (e) => {
    if (!drag.current.active) return;
    e.preventDefault();
    rowRef.current.scrollLeft = drag.current.scrollLeft - (e.pageX - drag.current.startX);
  };
  const onMouseUp = () => {
    drag.current.active = false;
    rowRef.current.style.cursor = "grab";
  };
  return (
    <div style={{ width: "100%", marginTop: 16, position: "relative" }}>
      <BadgeDetailPopup badge={selectedBadge} onClose={() => setSelectedBadge(null)} />
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10, padding: "0 16px" }}>
        <p style={{ margin: 0, fontWeight: 600, fontSize: 10, color: "rgba(255,255,255,0.70)", letterSpacing: "1.5px", textTransform: "uppercase", lineHeight: "125%" }}>

        <button onClick={onSeeAll} style={{ fontSize: 13, fontWeight: 600, color: "#82a1ff", background: "none", border: "none", cursor: "pointer", fontFamily: "inherit" }}>

      </div>
      {/* scroll row wrapper — needed for the fade overlay */}
      <div style={{ position: "relative", width: "100%" }}>
        <div ref={rowRef} onWheel={onWheel} onMouseDown={onMouseDown} onMouseMove={onMouseMove} onMouseUp={onMouseUp} onMouseLeave={onMouseUp} style={{ display: "flex", gap: 8, overflowX: "scroll", paddingLeft: 16, paddingRight: 40, paddingBottom: 4, boxSizing: "border-box", width: "100%", scrollbarWidth: "none", msOverflowStyle: "none", cursor: "grab", userSelect: "none" }}>
        {BADGES.map((b) => (
          <div key={b.label} onClick={() => setSelectedBadge(b)} style={{
            display: "flex", flexDirection: "column", alignItems: "center",
            flexShrink: 0, width: 92, padding: "10px 8px 8px",
            borderRadius: 16,
            background: "rgba(255,255,255,0.08)",
            backdropFilter: "blur(12px)",
            border: "1px solid rgba(255,255,255,0.10)",
            cursor: "pointer",
          }}>
            <div style={{
              display: "flex", alignItems: "center", justifyContent: "center",
              width: 34, height: 34, borderRadius: "50%",
              background: `${b.color}15`,
              border: `1.5px solid ${b.color}35`,
              fontSize: 17, marginBottom: 7, flexShrink: 0,
            }}>
              {b.emoji}
            </div>
            <span style={{ fontSize: 10, color: "rgba(255,255,255,0.90)", fontWeight: 500, textAlign: "center", lineHeight: 1.3, whiteSpace: "nowrap" }}>
              {b.label}
            </span>
            <span style={{ fontSize: 11, color: "rgba(255,255,255,0.50)", textAlign: "center", marginTop: 3, lineHeight: 1.3, whiteSpace: "nowrap" }}>
              {b.sub}
            </span>
          </div>
        ))}
        </div>
        {/* right-edge fade — signals more content */}
        <div style={{
          position: "absolute", top: 0, right: 0, bottom: 4,

  );

function TrendArrow({ trend }) {
  if (trend === 0) return null;
  const color = trend > 0 ? "#4ade80" : "#f87171";
  return trend > 0 ? (
    <svg width="10" height="10" viewBox="0 0 10 10" fill="none" style={{ display: "block", flexShrink: 0, position: "relative", top: -1 }}>
      <path d="M5 8.5V1.5M2 4.5l3-3 3 3" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  ) : (
    <svg width="10" height="10" viewBox="0 0 10 10" fill="none" style={{ display: "block", flexShrink: 0, position: "relative", top: -1 }}>
      <path d="M5 1.5v7M2 5.5l3 3 3-3" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

  return (
    <div
      onMouseDown={startLongPress}
      onMouseUp={cancelLongPress}
      onMouseLeave={cancelLongPress}
      onTouchStart={startLongPress}
      onTouchEnd={cancelLongPress}
      onTouchMove={cancelLongPress}

        display: "flex", flexDirection: "column", borderRadius: 16, overflow: "hidden",

function ContentGrid({ activeTab, onCharMenu }) {
  const [expanded, setExpanded] = useState(false);
  const gridTopRef = useRef(null);
  const btnRef     = useRef(null);

  const handleToggle = () => {
    const next = !expanded;
    setExpanded(next);
    if (next) {
      // after expansion transition, scroll button into view
      setTimeout(() => btnRef.current?.scrollIntoView({ behavior: "smooth", block: "end" }), 420);
    } else {
      // collapsing — scroll back to grid top
      setTimeout(() => gridTopRef.current?.scrollIntoView({ behavior: "smooth", block: "start" }), 0);
    }
  };

  if (activeTab === "Stories") {
    return (
      <div style={{ padding: "12px 12px 24px" }}>
        {STORIES.map(s => <StoryCard key={s.id} {...s} />)}
      </div>
    );
  }
  return (
    <div style={{ paddingBottom: 16 }}>
      {/* grid with peek clip */}
      <div ref={gridTopRef} style={{ position: "relative" }}>
        <div style={{
          display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 8, padding: 12,
          maxHeight: expanded ? 2000 : 420,
          overflow: "hidden",
          transition: "max-height 0.4s cubic-bezier(0.4,0,0.2,1)",
        }}>
          {CHARACTERS.map((c) => (
            <CharacterGridItem key={c.name} {...c} onMenu={() => onCharMenu && onCharMenu(c.name)} />
          ))}
        </div>
        {/* bottom fade — hidden when expanded */}
        {!expanded && (
          <div style={{
            position: "absolute", bottom: 0, left: 0, right: 0, height: 72,
            background: "linear-gradient(to bottom, transparent, #171717)",
            pointerEvents: "none",
          }} />
        )}
      </div>
      {/* load more / show less */}
      <div style={{ padding: "4px 12px 0" }}>
        <button
          ref={btnRef}
          onClick={handleToggle}
          style={{
            width: "100%", height: 44, borderRadius: 50,
            background: "rgba(255,255,255,0.05)",
            border: "1px solid rgba(255,255,255,0.10)",
            color: "rgba(255,255,255,0.70)",
            fontSize: 13, fontWeight: 600,
            cursor: "pointer", fontFamily: "inherit",
            display: "flex", alignItems: "center", justifyContent: "center", gap: 6,

  const handleClose = React.useCallback(() => {

    setTimeout(() => { setClosing(false); onClose(); }, 260);
  }, [onClose]);

  // Swipe-from-left-edge to go back
  const onTouchStart = (e) => {
    if (e.touches[0].clientX < 32) touchStartX.current = e.touches[0].clientX;
  };
  const onTouchMove = (e) => {
    if (touchStartX.current === null || !panelRef.current) return;
    const delta = e.touches[0].clientX - touchStartX.current;
    if (delta > 0) { panelRef.current.style.transform = `translateX(${delta}px)`; panelRef.current.style.transition = "none"; }
  };
  const onTouchEnd = (e) => {
    if (touchStartX.current === null || !panelRef.current) return;
    const delta = e.changedTouches[0].clientX - touchStartX.current;
    touchStartX.current = null;
    panelRef.current.style.transition = "transform 0.22s ease";
    if (delta > 80) { handleClose(); } else { panelRef.current.style.transform = "translateX(0)"; }
  };

  if (!open && !closing) return null;

  const isFollowingTab = activeTab === "Following";
  const data = isFollowingTab ? FOLLOWING : FOLLOWERS;

  // Use real stat values for counts
  const followersCount = PROFILE.stats.find(s => s.label === "Followers")?.value || FOLLOWERS.length;
  const followingCount = PROFILE.stats.find(s => s.label === "Following")?.value || FOLLOWING.length;

  return (
    <div
      ref={panelRef}
      onTouchStart={onTouchStart}
      onTouchMove={onTouchMove}
      onTouchEnd={onTouchEnd}
      style={{
        position: "absolute", inset: 0, zIndex: 10,
        background: "#171717", display: "flex", flexDirection: "column",
        animation: `${closing ? "slideOutRight" : "slideInRight"} 0.26s cubic-bezier(0.32,0.72,0,1) forwards`,
        fontFamily: "'Rubik', sans-serif",
      }}>

      {/* Back nav row */}
      <div style={{ display: "flex", alignItems: "center", padding: "12px 16px 10px", flexShrink: 0 }}>
        <button onClick={handleClose} style={{
          display: "flex", alignItems: "center", gap: 10,
          background: "none", border: "none", cursor: "pointer",
          padding: "4px 0", fontFamily: "inherit",
        }}>
          <svg width="24" height="20" viewBox="0 0 28 24" fill="none">
            <path d="M27 12H1M1 12l9 9M1 12l9-9" stroke="white" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
          <span style={{ fontSize: 17, fontWeight: 500, color: "white" }}>Profile</span>
        </button>
      </div>

      {/* Followers / Following tab bar — matches Characters/Stories style */}
      <div style={{ display: "flex", width: "100%", borderBottom: "1px solid rgba(255,255,255,0.10)", flexShrink: 0 }}>
        {["Followers", "Following"].map(tab => {
          const isActive = tab === activeTab;
          return (
            <button key={tab} onClick={() => setActiveTab(tab)} style={{
              flex: 1, border: "none", background: "transparent",
              padding: "8px 0 10px", fontSize: 13,
              fontWeight: isActive ? 600 : 400,
              color: isActive ? "white" : "rgba(255,255,255,0.45)",
              cursor: "pointer", position: "relative", fontFamily: "inherit",
            }}>
              {tab}<span style={{ margin: "0 4px", opacity: 0.35 }}>·</span>{tab === "Followers" ? followersCount : followingCount}
              {isActive && (
                <span style={{
                  position: "absolute", bottom: 0, left: "20%", right: "20%",
                  height: 2, borderRadius: 999, background: "#4a3ec6",
                }} />
              )}
            </button>
          );
        })}
      </div>

      {/* Scrollable list */}
      <div style={{ flex: 1, minHeight: 0, overflowY: "auto", scrollbarWidth: "none", paddingBottom: 72 }}>
        {data.length === 0 ? (
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "60%", gap: 10 }}>
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" style={{ opacity: 0.25 }}>
              <circle cx="12" cy="8" r="4" stroke="white" strokeWidth="1.5"/>
              <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="white" strokeWidth="1.5" strokeLinecap="round"/>
            </svg>
            <p style={{ margin: 0, fontSize: 14, color: "rgba(255,255,255,0.35)", fontWeight: 500 }}>
              No {activeTab.toLowerCase()} yet
            </p>
          </div>
        ) : data.map((f, i) => {
          const toggled  = isFollowingTab ? unfollowed[f.name] : followed[f.name];
          const toggle   = () => isFollowingTab
            ? setUnfollowed(prev => ({ ...prev, [f.name]: !prev[f.name] }))
            : setFollowed(prev => ({ ...prev, [f.name]: !prev[f.name] }));
          const label    = isFollowingTab ? (toggled ? "Follow" : "Following") : (toggled ? "Following" : "Follow back");
          const btnStyle = (isFollowingTab ? !toggled : toggled)
            ? { background: "rgba(255,255,255,0.80)", border: "none", color: "#4a3ec6" }
            : { background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.18)", color: "white" };

          return (
            <div key={f.name} style={{
              display: "flex", alignItems: "center", padding: "12px 20px",
              borderBottom: i < data.length - 1 ? "1px solid rgba(255,255,255,0.06)" : "none",
              cursor: "pointer",
            }}>
              <img src={f.img} alt={f.name} style={{ width: 48, height: 48, borderRadius: "50%", objectFit: "cover", flexShrink: 0, background: "#333" }} />
              <span style={{ flex: 1, marginLeft: 14, fontWeight: 600, fontSize: 15, color: "white" }}>{f.name}</span>
              <div onClick={(e) => { e.stopPropagation(); toggle(); }} style={{
                width: 112, textAlign: "center", padding: "7px 0", borderRadius: 20,
                fontSize: 13, fontWeight: 600, cursor: "pointer", flexShrink: 0,
                transition: "background 0.15s, color 0.15s",
                ...btnStyle,
              }}>{label}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}
